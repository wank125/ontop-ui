apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ontop-ui
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ontop-ui-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: FRONTEND_PORT
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: BACKEND_URL
            - name: COZE_PROJECT_ENV
              valueFrom:
                configMapKeyRef:
                  name: ontop-config
                  key: COZE_PROJECT_ENV
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ontop-ui
spec:
  selector:
    app: frontend
  ports:
    - port: 5000
      targetPort: 5000
