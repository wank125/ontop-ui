apiVersion: v1
kind: ConfigMap
metadata:
  name: ontop-config
  namespace: ontop-ui
data:
  # PostgreSQL
  POSTGRES_HOST: "postgres.ontop-ui.svc.cluster.local"
  POSTGRES_PORT: "5432"

  # Backend
  FASTAPI_PORT: "8000"
  ONTOP_CLI: "/opt/ontop-cli/ontop"
  ONTOP_OUTPUT: "/opt/ontop-output"
  ONTOP_ENDPOINT_URL: "http://backend:8000"
  ONTOP_ENDPOINT_PORT: "8080"
  LLM_BASE_URL: "http://host.docker.internal:1234/v1"
  LLM_MODEL: "zai-org/glm-4.7-flash"

  # Frontend
  FRONTEND_PORT: "5000"
  BACKEND_URL: "http://backend.ontop-ui.svc.cluster.local:8000"
  COZE_PROJECT_ENV: "PROD"
